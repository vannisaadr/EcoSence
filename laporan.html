<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSense - Laporan Data Sensor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="flex min-h-screen bg-[#F8FAFC]">

    <aside class="w-64 sidebar flex flex-col fixed h-full border-r border-slate-100 z-10 bg-white">
        <div class="p-8 flex items-center space-x-3">
              <a href="index.html" class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                <img src="icon.png" alt="Logo EcoSense">
            </a>
            <div>
                <h1 class="font-bold text-lg text-indigo-900 tracking-tight">EcoSense</h1>
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Sistem Monitoring</p>
            </div>
        </div>
        <nav class="mt-4 flex-grow">
            <a href="index.html" class="nav-item flex items-center px-8 py-4 text-slate-500 hover:bg-slate-50 transition">
                <i class="fas fa-th-large w-5 mr-3"></i> Dashboard
            </a>
            <a href="laporan.html" class="nav-item active flex items-center px-8 py-4 bg-indigo-50 text-indigo-600 border-r-4 border-indigo-600 font-bold">
                <i class="fas fa-file-invoice w-5 mr-3"></i> Laporan
            </a>
            <a href="prediksi.html" class="nav-item flex items-center px-8 py-4 text-slate-500 hover:bg-slate-50 transition">
                <i class="fas fa-file-invoice w-5 mr-3"></i> Prediksi
            </a>
        </nav>
    </aside>

    <main class="ml-64 flex-grow p-10">
<header class="flex justify-between items-center mb-10">
    <div>
        <h2 class="text-3xl font-bold text-slate-800">Laporan Data Sensor</h2>
        <p class="text-slate-500 mt-1 font-medium text-sm">Ringkasan rata-rata parameter per jam dari seluruh data.</p>
    </div>
    
    <div class="relative inline-block text-left">
        <button id="btn-cetak" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-xs font-bold flex items-center hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">
            <i class="fas fa-download mr-2"></i> Unduh Laporan
            <i class="fas fa-chevron-down ml-2 text-[10px]"></i>
        </button>

        <div id="dropdown-cetak" class="hidden absolute right-0 mt-2 w-40 origin-top-right bg-white border border-slate-100 rounded-xl shadow-xl z-20 overflow-hidden">
            <div class="py-1">
                <button onclick="unduhPDF()" class="flex items-center w-full px-4 py-3 text-xs font-bold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition">
                    <i class="fas fa-file-pdf mr-3 text-red-500 text-sm"></i> Unduh PDF
                </button>
                <button onclick="unduhCSV()" class="flex items-center w-full px-4 py-3 text-xs font-bold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition border-t border-slate-50">
                    <i class="fas fa-file-csv mr-3 text-emerald-500 text-sm"></i> Unduh CSV
                </button>
            </div>
        </div>
    </div>
</header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="glass-card p-5 bg-white rounded-2xl border border-slate-100 shadow-sm">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest block mb-3">Filter Tanggal</label>
                <div class="flex items-center gap-3 bg-slate-50 p-1 rounded-xl border border-slate-100 text-sm text-slate-600">
                    <i class="far fa-calendar text-slate-400 ml-3"></i>
                    <input type="date" id="filter-tanggal" class="bg-transparent border-none w-full p-2 focus:outline-none">
                </div>
            </div>
<div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center space-x-4 hover:border-slate-200 transition-all duration-300 shadow-sm">
    <div class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-500 flex items-center justify-center shrink-0">
        <i class="fas fa-clock text-lg"></i>
    </div>
    
    <div class="flex-1 relative">
        <label for="filter-jam" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">
            Filter Waktu
        </label>
        
        <div class="relative flex items-center">
            <select id="filter-jam" class="w-full appearance-none bg-transparent text-sm font-extrabold text-slate-700 focus:outline-none cursor-pointer pr-8 py-1">
                <option value="semua" class="font-sans">Tampilkan Semua Jam</option>
                <option disabled class="text-slate-300">──────────────────</option>
                <option value="0">00:00 - 01:00</option>
                <option value="1">01:00 - 02:00</option>
                <option value="2">02:00 - 03:00</option>
                <option value="3">03:00 - 04:00</option>
                <option value="4">04:00 - 05:00</option>
                <option value="5">05:00 - 06:00</option>
                <option value="6">06:00 - 07:00</option>
                <option value="7">07:00 - 08:00</option>
                <option value="8">08:00 - 09:00</option>
                <option value="9">09:00 - 10:00</option>
                <option value="10">10:00 - 11:00</option>
                <option value="11">11:00 - 12:00</option>
                <option value="12">12:00 - 13:00</option>
                <option value="13">13:00 - 14:00</option>
                <option value="14">14:00 - 15:00</option>
                <option value="15">15:00 - 16:00</option>
                <option value="16">16:00 - 17:00</option>
                <option value="17">17:00 - 18:00</option>
                <option value="18">18:00 - 19:00</option>
                <option value="19">19:00 - 20:00</option>
                <option value="20">20:00 - 21:00</option>
                <option value="21">21:00 - 22:00</option>
                <option value="22">22:00 - 23:00</option>
                <option value="23">23:00 - 00:00</option>
            </select>
            
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-2 text-slate-400">
                <svg class="h-4 w-4 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                    <path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
                </svg>
            </div>
        </div>
    </div>
</div>
</div>
        </div>

        <div class="glass-card bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden mb-6">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-slate-400 uppercase text-[11px] font-bold tracking-wider bg-slate-50/50">
                        <th class="px-8 py-6">Tanggal</th>
                        <th class="px-8 py-6">Rentang Jam</th>
                        <th class="px-8 py-6 text-center">Rerata Suhu</th>
                        <th class="px-8 py-6 text-center">Rerata Lembab</th>
                        <th class="px-8 py-6">Status Kondisi</th>
                    </tr>
                </thead>
                <tbody id="tabel-laporan-body" class="text-slate-600 font-medium text-sm">
                    <tr>
                        <td colspan="5" class="px-8 py-20 text-center text-slate-400 italic">
                            Mengambil data historis...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="flex justify-between items-center px-4">
            <p id="pageInfo" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Halaman 1</p>
            <div class="flex gap-2">
                <button id="prevPage" class="px-4 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-50 disabled:opacity-50 transition">
                    <i class="fas fa-chevron-left mr-1"></i> Sebelumnya
                </button>
                <button id="nextPage" class="px-4 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-50 disabled:opacity-50 transition">
                    Selanjutnya <i class="fas fa-chevron-right ml-1"></i>
                </button>
            </div>
        </div>
    </main>

    <script src="supabase.js"></script>
    <script src="laporan.js"></script>
</body>
</html>
